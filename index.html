<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<meta name="color-scheme" content="dark light"/>
<title>دبلوم التسويق التطبيقي — منصة الاختبارات</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&family=Cairo:wght@300;400;600;700;800;900&family=Manrope:wght@500;600;700;800&display=swap" rel="stylesheet"/>
<style>
:root {
  --navy:#0f172a;
  --navy2:#1e293b;
  --gold:#d4af37;
  --gold2:#e8c547;
  --ok:#22c55e;
  --bad:#ef4444;
  --warn:#f59e0b;
  --r:20px;
  --r2:14px;
  /* Prefer clear Arabic first, then system UI */
  --font: Tajawal,Cairo,"Noto Sans Arabic","Noto Kufi Arabic",-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,system-ui,sans-serif;
  --mono: ui-monospace,SFMono-Regular,Menlo,monospace;
  /* Modern UI sans for English verbs (irregular verbs tables / quiz) */
  --irr-en: "Manrope","Plus Jakarta Sans","DM Sans",ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
  /* Fluid layout tokens (mobile-first) */
  --page-pad: clamp(12px, 3.5vw, 22px);
  --page-pad-lg: clamp(18px, 4vw, 28px);
  --content-max: 1100px;
  --touch-min: 44px;
  --tabbar-h: 56px;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --safe-top: env(safe-area-inset-top, 0px);
  /* موحّد لجميع الشبكات — وحدات ثابتة لتفادي قفزات التخطيط */
  --card-gap: 14px;
  --card-gap-lg: 16px;
  --grid-margin-top: 18px;
}
[data-theme="dark"] {
  --bg:#020617;
  --bg2:#0f172a;
  --surface: rgba(255,255,255,.06);
  --surface2: rgba(255,255,255,.09);
  --border: rgba(255,255,255,.12);
  --text:#f8fafc;
  --muted: rgba(248,250,252,.72);
  --shadow: 0 25px 80px rgba(0,0,0,.45);
  --glass: blur(20px);
}
[data-theme="light"] {
  --bg:#f4f4f5;
  --bg2:#e4e4e7;
  --surface: rgba(255,255,255,.72);
  --surface2: rgba(255,255,255,.9);
  --border: rgba(15,23,42,.1);
  --text:#0f172a;
  --muted: rgba(15,23,42,.62);
  --shadow: 0 25px 60px rgba(15,23,42,.12);
  --glass: blur(16px);
}
* { box-sizing:border-box; margin:0; }
html {
  height:100%;
  max-width:100vw;
  overflow-x:hidden;
  scroll-behavior:smooth;
  -webkit-text-size-adjust:100%;
}
body {
  min-height:100%;
  min-height:100dvh;
  width:100%;
  max-width:100vw;
  overflow-x:hidden;
  font-size:clamp(15px, 0.22vw + 14px, 17px);
  font-family:var(--font);
  /* تدرّج واحد مستمر (بدون بقع/حركة) */
  background: linear-gradient(180deg, var(--bg) 0%, color-mix(in srgb, var(--bg) 35%, var(--bg2)) 45%, var(--bg2) 100%);
  background-attachment: fixed;
  color:var(--text);
  line-height:1.5;
  -webkit-font-smoothing:antialiased;
}
a { color:inherit; text-decoration:none; }
button,input { font:inherit; color:inherit; }
.sr { position:absolute;width:1px;height:1px;clip:rect(0,0,0,0);overflow:hidden; }

.app { min-height:100%; width:100%; max-width:100%; display:flex; flex-direction:column; }

.topbar {
  position:sticky; top:0; z-index:100;
  padding-top:var(--safe-top);
  backdrop-filter: var(--glass); -webkit-backdrop-filter: var(--glass);
  background: color-mix(in srgb, var(--bg2) 82%, transparent);
  border-bottom:1px solid var(--border);
  transition: background .25s ease, box-shadow .2s ease;
}
.topbar.is-scrolled {
  box-shadow: 0 10px 40px rgba(0,0,0,.14);
}
.tb-in {
  max-width:min(var(--content-max), 100%);
  margin:0 auto;
  padding:10px var(--page-pad);
  min-height:52px;
  box-sizing:border-box;
  display:flex;
  align-items:center;
  gap:clamp(8px, 2vw, 14px);
  flex-wrap:wrap;
}
.topbar-cluster {
  display:flex;
  flex:1;
  align-items:center;
  justify-content:center;
  gap:4px;
  flex-wrap:wrap;
  min-width:0;
}
.topbar-menu-btn {
  display:none !important;
}
.topbar-backdrop {
  display:none;
}
@media (min-width:901px) {
  .tb-in .topbar-cluster .nav {
    flex:1;
    justify-content:center;
  }
}
@media (max-width:900px) {
  .tb-in {
    flex-wrap:nowrap;
    justify-content:space-between;
    align-items:center;
    gap:10px;
    padding-top:max(8px, var(--safe-top));
    padding-left:max(10px, var(--page-pad));
    padding-right:max(10px, var(--page-pad));
  }
  .brand {
    min-width:0;
    flex:1;
  }
  .brand h1 { font-size:15px; line-height:1.25; }
  .brand p { font-size:11px; max-width:100%; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .logo { width:40px; height:40px; flex-shrink:0; border-radius:12px; }
  .topbar-menu-btn {
    display:inline-flex !important;
    flex-shrink:0;
  }
  .topbar-cluster {
    display:none;
    position:fixed;
    left:0;
    right:0;
    top:var(--topbar-menu-top, 56px);
    z-index:140;
    flex-direction:column;
    align-items:stretch;
    gap:14px;
    padding:16px 18px calc(18px + env(safe-area-inset-bottom));
    margin:0;
    flex:unset;
    max-height:min(78vh, calc(100dvh - var(--topbar-menu-top, 56px) - 12px));
    overflow-y:auto;
    -webkit-overflow-scrolling:touch;
    background:color-mix(in srgb, var(--bg2) 96%, transparent);
    backdrop-filter:blur(20px);
    -webkit-backdrop-filter:blur(20px);
    border-bottom:1px solid var(--border);
    box-shadow:0 18px 50px rgba(0,0,0,.22);
  }
  .topbar.is-menu-open .topbar-cluster {
    display:flex;
  }
  .topbar-cluster .nav {
    width:100%;
    flex-wrap:nowrap;
    flex-direction:column;
    align-items:stretch;
    justify-content:flex-start;
    overflow:visible;
    gap:8px;
    padding:0;
    margin:0;
    border:none;
    mask-image:none;
    -webkit-mask-image:none;
  }
  .topbar-cluster .nav a {
    width:100%;
    text-align:center;
    padding:12px 14px;
    border-radius:14px;
  }
  .topbar-cluster .tools {
    width:100%;
    justify-content:center;
    flex-wrap:wrap;
    gap:10px;
    padding-top:12px;
    border-top:1px solid color-mix(in srgb, var(--border) 55%, transparent);
  }
  .topbar-backdrop {
    display:none;
    position:fixed;
    inset:0;
    z-index:135;
    background:rgba(2,6,23,.42);
    backdrop-filter:blur(2px);
    -webkit-backdrop-filter:blur(2px);
  }
  .topbar.is-menu-open .topbar-backdrop {
    display:block;
  }
}
@media (max-width:380px) {
  .icobtn { min-width:42px; min-height:42px; font-size:15px; }
  .chip { padding:6px 10px; font-size:11px; gap:6px; }
}
.brand {
  display:flex; align-items:center; gap:10px; cursor:pointer;
}
.logo {
  width:40px;height:40px;border-radius:12px;
  background: linear-gradient(145deg,var(--gold),#9a7b0a);
  box-shadow: 0 8px 24px rgba(212,175,55,.25);
}
.brand h1 { font-size:15px; font-weight:800; letter-spacing:-.02em; line-height:1.25; }
.brand p { font-size:11px; color:var(--muted); font-weight:600; margin-top:2px; line-height:1.3; }

.nav { display:flex; gap:4px; flex:1; justify-content:center; flex-wrap:wrap; }
.nav a {
  padding:10px 14px; border-radius:999px; font-size:13px; font-weight:650;
  color:var(--muted); transition: color .2s, background .2s, transform .2s;
}
.nav a:hover { background:var(--surface); color:var(--text); }
.nav a[aria-current="page"] {
  background: color-mix(in srgb, var(--gold) 22%, var(--surface));
  color:var(--text); font-weight:750;
}
.nav a.nav-home-ic {
  display:inline-flex;
  align-items:center;
  justify-content:center;
  padding:10px 12px;
  border-radius:14px;
  line-height:0;
}
.nav a.nav-home-ic .em-ic {
  width:22px;
  height:22px;
  flex-shrink:0;
}

.tools { display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
.icobtn {
  min-width:44px; min-height:44px; border-radius:12px;
  border:1px solid var(--border); background:var(--surface);
  cursor:pointer; display:inline-flex; align-items:center; justify-content:center;
  font-size:16px; transition: transform .15s ease, background .2s;
}
.icobtn:hover { transform: scale(1.04); background:var(--surface2); }
.icobtn:active { transform: scale(.97); }

.chip {
  display:flex; align-items:center; gap:8px; padding:8px 12px; border-radius:999px;
  background:var(--surface); border:1px solid var(--border); font-size:12px; font-weight:650;
}

.shell {
  flex:1;
  width:100%;
  max-width:min(var(--content-max), 100%);
  margin:0 auto;
  padding:var(--page-pad-lg) var(--page-pad) calc(48px + var(--safe-bottom));
}

.hero {
  border-radius: calc(var(--r) + 4px);
  padding:clamp(18px, 4vw, 28px) clamp(16px, 3.5vw, 24px);
  background: var(--surface2);
  border:1px solid var(--border);
  box-shadow: var(--shadow);
  margin-bottom:22px;
  animation: fadeUp .5s ease both;
}
@keyframes fadeUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:none; } }
.hero h2 { font-size:clamp(22px,4vw,30px); font-weight:800; letter-spacing:-.03em; margin-bottom:8px; }
.hero .lead { color:var(--muted); font-size:15px; max-width:62ch; font-weight:500; }

.kpis { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-top:20px; }
@media(max-width:720px){ .kpis { grid-template-columns:1fr; } }
.kpi {
  padding:16px; border-radius:var(--r2); background:var(--surface); border:1px solid var(--border);
}
.kpi .v { font-size:26px; font-weight:800; letter-spacing:-.02em; }
.kpi .l { font-size:12px; color:var(--muted); font-weight:600; margin-top:4px; }

.qgrid {
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(min(100%, 260px), 1fr));
  gap:clamp(10px, 2.5vw, 14px);
}
.qcard {
  border-radius:var(--r); padding:18px; background:var(--surface2); border:1px solid var(--border);
  box-shadow: 0 12px 40px rgba(0,0,0,.08);
  display:flex; flex-direction:column; gap:10px;
  transition: transform .2s ease, box-shadow .2s;
  animation: fadeUp .45s ease both;
}
.qcard:nth-child(1){animation-delay:.03s} .qcard:nth-child(2){animation-delay:.06s}
.qcard:nth-child(3){animation-delay:.09s} .qcard:nth-child(4){animation-delay:.12s}
.qcard:nth-child(5){animation-delay:.15s} .qcard:nth-child(6){animation-delay:.18s}
.qcard:hover { transform: translateY(-3px); box-shadow: 0 18px 50px rgba(0,0,0,.12); }
.qcard h3 { font-size:16px; font-weight:750; }
.qcard .meta { font-size:12px; color:var(--muted); font-weight:600; }
.bar { height:7px; border-radius:99px; background:var(--surface); overflow:hidden; border:1px solid var(--border); }
.bar>i { display:block; height:100%; width:0%; background:linear-gradient(90deg,var(--gold),var(--gold2)); transition:width .4s cubic-bezier(.22,1,.36,1); }

.btn {
  display:inline-flex; align-items:center; justify-content:center; gap:8px;
  padding:12px 18px; border-radius:14px; font-weight:650; font-size:14px;
  border:none; cursor:pointer; transition: transform .15s, filter .2s, box-shadow .2s;
  min-height:48px;
}
.btn-primary {
  background:linear-gradient(180deg,var(--gold2),var(--gold)); color:#0f172a;
  box-shadow:0 8px 28px rgba(212,175,55,.28);
}
.btn-primary:hover { filter:brightness(1.05); }
.btn-primary:active { transform:scale(.98); }
.btn-sec { background:var(--surface); border:1px solid var(--border); color:var(--text); }
.btn-sec:hover { background:var(--surface2); }

.toolbar {
  display:flex; flex-wrap:wrap; gap:10px; align-items:center; margin-bottom:16px;
  padding:14px; border-radius:var(--r2); background:var(--surface); border:1px solid var(--border);
}
@media (max-width:520px) {
  .toolbar { flex-direction:column; align-items:stretch; }
  .toolbar .btn { width:100%; }
}
.search {
  flex:1; min-width:min(220px, 100%); display:flex; align-items:center; gap:10px;
  padding:12px 14px; border-radius:14px; border:1px solid var(--border); background:var(--surface2);
}
.search input { flex:1; border:none; background:transparent; outline:none; font-weight:500; }

.rowlist { display:flex; flex-direction:column; gap:10px; }
.qrow {
  padding:14px 16px; border-radius:var(--r2); border:1px solid var(--border);
  background:var(--surface2); cursor:pointer; transition: border-color .2s, transform .15s;
}
.qrow:hover { border-color: color-mix(in srgb, var(--gold) 40%, var(--border)); transform:translateX(-2px); }
html[dir="ltr"] .qrow:hover { transform:translateX(2px); }
.qrow .t { font-weight:650; font-size:14px; line-height:1.45; }
.qrow .m { font-size:11px; color:var(--muted); margin-top:6px; font-weight:600; }

.panel {
  border-radius:var(--r);
  padding:clamp(14px, 3.2vw, 22px);
  background:var(--surface2);
  border:1px solid var(--border);
  box-shadow: var(--shadow);
  max-width:100%;
  overflow-wrap:anywhere;
  word-wrap:break-word;
}
/* Premium glass cards (Grammar lessons) */
.glass-card {
  background: color-mix(in srgb, var(--surface2) 74%, transparent);
  backdrop-filter: blur(18px);
  -webkit-backdrop-filter: blur(18px);
  border:1px solid color-mix(in srgb, var(--border) 70%, transparent);
  box-shadow: 0 22px 60px rgba(0,0,0,.14);
}
.gram-sec-title {
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  margin:0 0 10px;
  font-size:15px;
  font-weight:950;
  letter-spacing:-.01em;
}
.gram-sec-title .warn {
  font-size:13px;
  color:#ef4444;
  font-weight:900;
  margin-inline-start:6px;
}
.gram-sec-kicker {
  margin:0 0 10px;
  color:var(--muted);
  font-size:13px;
  font-weight:700;
  line-height:1.55;
}
.gram-mini-tabs {
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  margin:10px 0 14px;
}
.gram-mini-tabs .pill { padding:10px 16px; font-weight:750; }
.qhead { display:flex; flex-wrap:wrap; justify-content:space-between; gap:12px; align-items:flex-start; margin-bottom:16px; }
.qnum { font-size:13px; font-weight:700; color:var(--muted); }
.qnum-title { font-size:15px; font-weight:800; color:var(--text); margin-bottom:4px; }

.quiz-stat-grid {
  display:grid;
  grid-template-columns:repeat(3, minmax(0, 1fr));
  gap:10px;
  margin-top:12px;
}
.quiz-stat-cell {
  padding:11px 12px;
  border-radius:12px;
  border:1px solid var(--border);
  background:var(--surface);
  text-align:center;
}
.quiz-stat-k {
  display:block;
  font-size:10px;
  font-weight:800;
  letter-spacing:.08em;
  text-transform:uppercase;
  color:var(--muted);
  margin-bottom:6px;
}
.quiz-stat-v {
  font-size:18px;
  font-weight:850;
  color:var(--gold);
  font-variant-numeric:tabular-nums;
  line-height:1.15;
}
@media (max-width:420px) {
  .quiz-stat-grid { grid-template-columns:1fr; }
}

.tests-hub-meta {
  font-size:13px;
  font-weight:650;
  color:var(--muted);
  line-height:1.45;
  margin-top:6px;
}

.gram-answer-remain,
.voc-quiz-stats,
.gram-final-remain {
  font-size:12px;
  font-weight:700;
  color:var(--muted);
  margin:0 0 10px;
  padding:8px 10px;
  border-radius:10px;
  background:color-mix(in srgb, var(--gold) 8%, transparent);
  border:1px solid color-mix(in srgb, var(--gold) 22%, var(--border));
}
.voc-quiz-stats { margin-bottom:12px; text-align:center; }
.qtext {
  font-size:clamp(16px, 2.6vw, 19px);
  font-weight:650;
  line-height:1.55;
  margin:16px 0;
  letter-spacing:-.01em;
  overflow-wrap:anywhere;
  word-break:normal;
  text-wrap:pretty;
  hanging-punctuation:first allow-end last allow-end;
  unicode-bidi:plaintext;
}
.quiz-learn-main .qtext {
  text-align:start;
}
.w-token {
  cursor:default; border-bottom:1px dotted color-mix(in srgb, var(--gold) 55%, transparent);
  transition: background .15s;
}
.w-token:hover { background: color-mix(in srgb, var(--gold) 12%, transparent); }

.opts { display:flex; flex-direction:column; gap:10px; }
.opts .opt {
  direction:ltr;
  text-align:left;
}
.opts .opt .txt { direction:ltr; }
.opt {
  display:flex; gap:12px; align-items:flex-start; text-align:start;
  padding:14px 16px; border-radius:16px; border:1px solid var(--border);
  background:var(--surface); cursor:pointer; font-weight:550; font-size:15px;
  transition: background .2s, border-color .2s, transform .1s;
  min-height:52px;
}
.opt:hover:not(:disabled) { background:var(--surface2); }
.opt:active:not(:disabled) { transform:scale(.99); }
.opt .L { font-family:var(--mono); font-weight:800; color:var(--gold); min-width:24px; flex-shrink:0; }
.quiz-panel--rtl .quiz-learn-main .qtext {
  direction:rtl;
  text-align:right;
  font-family:var(--font);
  font-weight:700;
}
.quiz-panel--rtl .opts .opt {
  direction:rtl;
  text-align:right;
  justify-content:flex-start;
}
.quiz-panel--rtl .opts .opt .txt {
  direction:rtl;
  text-align:right;
  font-weight:500;
  padding-right:2px;
}
.quiz-panel--rtl .opt .L {
  order:-1;
}
.opt.correct { border-color: rgba(34,197,94,.5); background: rgba(34,197,94,.1); }
.opt.wrong { border-color: rgba(239,68,68,.45); background: rgba(239,68,68,.08); }

.review-banner {
  padding:12px 14px; border-radius:14px; border:1px dashed rgba(245,158,11,.5);
  background: rgba(245,158,11,.1); font-size:13px; font-weight:650; margin-bottom:14px;
}

.learn {
  margin-top:20px; padding-top:18px; border-top:1px solid var(--border);
  display:grid; gap:12px; animation: fadeUp .4s ease both;
}
.lblock {
  padding:14px 16px; border-radius:var(--r2); background:var(--surface); border:1px solid var(--border);
}
.lblock h4 {
  font-size:11px; text-transform:uppercase; letter-spacing:.08em; color:var(--gold);
  font-weight:800; margin-bottom:8px;
}
.lblock .ar { font-weight:600; line-height:1.65; }
.lblock .en { font-family:var(--font); font-weight:550; color:var(--text); }

.pillrow { display:flex; flex-wrap:wrap; gap:8px; margin-top:12px; }
.pill {
  padding:10px 14px; border-radius:999px; border:1px solid var(--border);
  background:var(--surface); font-size:12px; font-weight:650; cursor:pointer;
  min-height:var(--touch-min);
  -webkit-tap-highlight-color:transparent;
}
.pill.on { background: color-mix(in srgb, var(--gold) 18%, var(--surface)); border-color: rgba(212,175,55,.35); }

.stats-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:12px; }
.stat {
  padding:16px; border-radius:var(--r2); border:1px solid var(--border); background:var(--surface2);
}
.stat .n { font-size:24px; font-weight:800; }
.stat .k { font-size:12px; color:var(--muted); margin-top:6px; font-weight:600; }

.footer {
  display:none;
}

.toast-wrap { position:fixed; bottom:20px; inset-inline:0; z-index:200; pointer-events:none; display:flex; flex-direction:column; align-items:center; gap:8px; }
.toast {
  pointer-events:auto; padding:12px 18px; border-radius:14px; background:var(--navy); color:#fff;
  box-shadow:var(--shadow); font-size:13px; font-weight:600; max-width:min(420px,92vw);
  animation: toastIn .35s cubic-bezier(.22,1,.36,1) both;
}
@keyframes toastIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:none; } }
.toast.ok { border:1px solid rgba(34,197,94,.4); }
.toast.bad { border:1px solid rgba(239,68,68,.4); }

#wtip {
  position:fixed; z-index:300; display:none; max-width:min(320px,92vw);
  padding:14px 16px; border-radius:16px; background:var(--navy2); color:#f8fafc;
  border:1px solid var(--border); box-shadow:var(--shadow); font-size:13px; line-height:1.45;
}

.quiz-review-offer {

/* شريط الكويز: يتبع اتجاه اللغة — EN: رجوع+إيقاف من البداية (يسار) · AR: من البداية (يمين) | فاصل | المجموعة الثانية */

/* تركيز: الشريط العلوي شقيق للوحة وليس داخلها — نخفي عبر quiz-page-head--focus */
.quiz-page-head--focus .quiz-page-head-trail,
.quiz-page-head--focus .quiz-pause-btn { display:none !important; }

}
.subject-card--review .subject-card-ic {

/* Stroke icons — unified weight (Lucide-style), color via currentColor */
.em-ic {
  display:block;
  flex-shrink:0;
  stroke:currentColor;
  fill:none;
  stroke-width:2;
  stroke-linecap:round;
  stroke-linejoin:round;

}

/* دخول صفحة خفيف — يقلّل إحساس القفزة عند الرجوع */
.page-surface {
  animation: pageEnter 0.38s cubic-bezier(0.22, 1, 0.36, 1) both;
}
body.no-page-anim .page-surface {
  animation: none !important;
}
@keyframes pageEnter {
  from {
    opacity: 0;
    transform: translateY(12px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}
@keyframes homeCardReveal {
  from {
    opacity: 0;
    transform: translateY(18px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}
/* نفس أسلوب دخول البطاقات في كل مرة نُعرض فيها الرئيسية — صعود ناعم + شفافية */
.page-surface--home .hub-intro--home {

}
.page-surface--home .subject-grid--home .subject-card--home {

}
.page-surface--home .subject-grid--home .subject-card--home:nth-child(1) { animation-delay: 0.05s; }
.page-surface--home .subject-grid--home .subject-card--home:nth-child(2) { animation-delay: 0.1s; }
.page-surface--home .subject-grid--home .subject-card--home:nth-child(3) { animation-delay: 0.15s; }
.page-surface--home .subject-grid--home .subject-card--home:nth-child(4) { animation-delay: 0.2s; }
.page-surface--home .subject-grid--home .subject-card--home:nth-child(5) { animation-delay: 0.25s; }
.page-surface--home .subject-grid--home .subject-card--home:nth-child(6) { animation-delay: 0.3s; }
.page-surface--home .subject-grid--home .subject-card--home:nth-child(7) { animation-delay: 0.35s; }
.page-surface--home .subject-grid--home .subject-card--home:nth-child(8) { animation-delay: 0.4s; }

.smart-bar { display:flex; flex-wrap:wrap; gap:8px; margin:16px 0; }

.ar-text, .en-text {

  align-items:center;
  gap:8px 12px;
  user-select:none;
  -webkit-tap-highlight-color:transparent;

  min-width:0;

  content:"▼";

  justify-self:center;
  grid-column:3;

.voc-num {

  .gram-rule-block:has(table.gram-table),
  .gram-rule-block:has(table.gram-pronoun-table),
  .gram-ex:has(table),
  details.panel .gram-sec-body:has(table.gram-table) {
    overflow-x:auto;
    -webkit-overflow-scrolling:touch;
    max-width:100%;
    margin-inline:-4px;
    padding-inline:4px;
  }
}

re","you"],"correct":0,"why_ar":"your car.","rule_ar":"Possessive adjective."},{"question_en":"The dog hurt ___ paw.","options":["its","it's","it"],"correct":0,"why_ar":"ملكية للحيوان → its.","rule_ar":"its + body part."},{"question_en":"Is this ___ umbrella?","options":["your","you're","you"],"correct":0,"why_ar":"قبل اسم → your.","rule_ar":"your + noun."},{"question_en":"Those seats are ___. (they belong to us)","options":["ours","our","we"],"correct":0,"why_ar":"ضمير ملكية منفصل بدون اسم بعده.","rule_ar":"Possessive pronoun ours."},{"question_en":"___ dictionary is this?","options":["Who's","Whose","Who"],"correct":1,"why_ar":"Whose = لمن.","rule_ar":"Whose + noun?"},{"question_en":"She spoke to ___ teacher after class.","options":["her","she","hers"],"correct":0,"why_ar":"her teacher.","rule_ar":"her + noun."},{"question_en":"We painted ___ bedroom white.","options":["our","we","hours"],"correct":0,"why_ar":"our bedroom.","rule_ar":"our + noun."},{"question_en":"___ not my coat — pick the contraction for «it is».","options":["It's","Its","Its'"],"correct":0,"why_ar":"It's = it is.","rule_ar":"it's vs its."},{"question_en":"Whose keys ___ these?","options":["are","is","am"],"correct":0,"why_ar":"keys جمع → are.","rule_ar":"Whose + noun + be."},{"question_en":"___ phone keeps ringing.","options":["Mary's","Marys","Marys'"],"correct":0,"why_ar":"Mary's phone.","rule_ar":"Singular name + ’s."},{"question_en":"They sold ___ old bikes.","options":["their","they're","there"],"correct":0,"why_ar":"their bikes.","rule_ar":"their + plural noun."}]},"coordinating-conjunctions-and-or-but":{"categoryId":"unit-1-foundations","title_en":"Coordinating conjunctions: and, or, but","title_ar":"أدوات الربط: and و or و but","keywords":["and","or","but","coordinating conjunctions","linking"],"explanation_ar":"أدوات الربط المتساوية تربط كلمات أو مجموعات كلمات من نفس النوع. and تربط أفكارًا متشابهة أو إضافية؛ or تربط بدائل؛ but تربط تباينًا أو تعارضًا بين جزأين.","rule_en":"and → similar / added ideas; or → alternatives (choice); but → contrast.","table":{"headers":["Conjunction","Role","Example"],"rows":[["and","similar / added ideas","I like apples and bananas."],["or","alternatives","Do you want an apple or a banana?"],["but","contrast","I like apples but I don't like bananas."]]},"examples":[{"en":"I like apples and bananas.","ar":"أحب التفاح والموز."},{"en":"Do you want tea or coffee?","ar":"هل تريد شايًا أم قهوة؟"},{"en":"She's tired but she's happy.","ar":"هي متعبة لكنها سعيدة."}],"notes_ar":"الأجزاء المتصلة يجب أن تكون متوازية نحويًا (اسم واسم، جملة وجملة…).","mistakes_ar":"استخدام but رغم عدم وجود تعارض؛ أو but بين عناصر غير متوازية.","compare_ar":"because تشرح السبب؛ but تعرض التباين فقط.","quiz":[{"question_en":"I bought bread ___ butter at the store.","options":["and","but","or"],"correct":0,"why_ar":"إضافة غرضين متشابهين في القائمة → and.","rule_ar":"and links similar items."},{"question_en":"Do you want the red one ___ the blue one?","options":["and","or","but"],"correct":1,"why_ar":"اختيار بين بديلين → or.","rule_ar":"or for alternatives."},{"question_en":"It's cheap ___ it's good quality.","options":["and","but","or"],"correct":0,"why_ar":"إضافة صفتين متوافقتين → and.","rule_ar":"and for addition."},{"question_en":"She wanted to stay, ___ she had to leave.","options":["and","but","or"],"correct":1,"why_ar":"رغبة مقابل إجبار → تباين → but.","rule_ar":"but links contrasting clauses."},{"question_en":"He's rich ___ unhappy.","options":["and","but","or"],"correct":1,"why_ar":"تعارض بين غني وحزين → but.","rule_ar":"but for contrast."},{"question_en":"Walk straight ___ turn left at the bank.","options":["and","or","but"],"correct":0,"why_ar":"تتابع خطوات → and.","rule_ar":"Sequential instructions with and."},{"question_en":"We can meet today ___ tomorrow.","options":["and","or","but"],"correct":1,"why_ar":"خياران زمنيان → or.","rule_ar":"or between options."},{"question_en":"She likes maths ___ finds physics difficult.","options":["and","but","or"],"correct":1,"why_ar":"إعجاب مقابل صعوبة → contrast → but.","rule_ar":"but."},{"question_en":"Do you travel by bus ___ by train?","options":["and","or","but"],"correct":1,"why_ar":"وسيلتان بديلتان → or.","rule_ar":"or in questions of choice."},{"question_en":"I'd love to go, ___ I'm too busy.","options":["and","but","or"],"correct":1,"why_ar":"رغبة مقابل عائق → but.","rule_ar":"but for contrast."}]},"there-is-there-are":{"categoryId":"unit-1-foundations","title_en":"There is / There are","title_ar":"There is / There are","keywords":["there is","there are","some","existence","singular","plural"],"explanation_ar":"نستخدم There is / There are لقول أن شيئًا موجودًا (أو غير موجود) في مكان أو سياق. الشكل يتبع أول اسم بعد there غالبًا: مفرد أو غير معدود → there is؛ جمع → there are. مع الجمل غير المعدودة مثل milk نستخدم there is some milk.","rule_en":"There is + singular / uncountable. There are + plural nouns. Negative: There isn't / There aren't. Question: Is there…? Are there…?","table":{"headers":["Form","Example"],"rows":[["There is + singular","There is a book on the desk."],["There are + plural","There are books on the desk."],["There is + uncountable","There is some milk in the fridge."]]},"examples":[{"en":"There is a book on the desk.","ar":"هناك كتاب على المكتب."},{"en":"There are books on the desk.","ar":"هناك كتب على المكتب."},{"en":"There is some milk in the fridge.","ar":"هناك بعض الحليب في الثلاجة."},{"en":"There aren't any problems.","ar":"لا توجد أي مشاكل."}],"notes_ar":"في اللغة المنطوقة يُسمع There's مع جمع أحيانًا؛ في الامتحانات الرسمية التزم there are مع الجمع.","mistakes_ar":"There is مع جمع (*There is many books).","compare_ar":"They are يصف «هم»؛ there are يصف وجود أشياء في مكان.","quiz":[{"question_en":"There ___ two pens on the floor.","options":["are","is","am"],"correct":0,"why_ar":"two pens جمع → there are.","rule_ar":"There are + plural."},{"question_en":"There ___ a problem with the Wi‑Fi.","options":["is","are","be"],"correct":0,"why_ar":"a problem مفرد → there is.","rule_ar":"There is + singular."},{"question_en":"___ there any sugar?","options":["Is","Are","Do"],"correct":0,"why_ar":"sugar غير معدود هنا → Is there…?","rule_ar":"Is there + uncountable."},{"question_en":"There ___ some chairs in the room.","options":["are","is","has"],"correct":0,"why_ar":"chairs جمع.","rule_ar":"There are."},{"question_en":"There ___ not enough time.","options":["is","are","were"],"correct":0,"why_ar":"time غير معدود → is.","rule_ar":"There isn't + uncountable."},{"question_en":"___ there many students?","options":["Are","Is","Do"],"correct":0,"why_ar":"many students جمع → Are there…?","rule_ar":"Are there + plural?"},{"question_en":"There ___ a cat and two dogs in the yard.","options":["is","are","have"],"correct":0,"why_ar":"الاتفاق غالبًا مع أول اسم (a cat) في اللغة غير الرسمية؛ المعيار التعليمي يركز there is مع أول عنصر مفرد.","rule_ar":"There is + first item singular (proximity agreement)."},{"question_en":"There ___ no apples left.","options":["are","is","were"],"correct":0,"why_ar":"apples جمع → are.","rule_ar":"There are + plural subject."},{"question_en":"___ there a bank near here?","options":["Is","Are","Does"],"correct":0,"why_ar":"a bank مفرد.","rule_ar":"Is there a…?"},{"question_en":"There ___ lots of people outside.","options":["are","is","was"],"correct":0,"why_ar":"people جمع → are.","rule_ar":"There are + plural."}]},"prepositions-of-place":{"categoryId":"unit-2-nouns-place-tense","title_en":"Prepositions of place","title_ar":"حروف الجر للمكان","keywords":["in","on","under","behind","between","next to","above","below"],"explanation_ar":"حروف الجر التي تلي اسم مكان توضح موضع الشيء بالنسبة لآخر: داخل (in)، على سطح (on)، تحت (under)، أمام (in front of)، خلف (behind)، بجانب (next to)، فوق (above)، أسفل (below)، بين (between)، يمين/يسار، مقابل (opposite).","rule_en":"in / on / under / in front of / behind / next to / above / below / between / on the left / on the right / opposite + noun phrase.","table":{"headers":["Preposition","Arabic hint","Example"],"rows":[["in","في (داخل)","The keys are in the drawer."],["on","على","The phone is on the table."],["under","تحت","The cat is under the chair."],["in front of","أمام","There is a tree in front of the house."],["behind","خلف","Park behind the supermarket."],["next to","بجانب","Sit next to me."],["between","بين","The cafe is between the bank and the library."],["above / below","فوق / أسفل","The flat above ours is noisy."],["opposite","مقابل","The hospital is opposite the park."],["on the left / right","يسار / يمين","Turn right at the corner."]]},"examples":[{"en":"Your bag is under the seat.","ar":"حقيبتك تحت المقعد."},{"en":"The picture hangs above the sofa.","ar":"الصورة معلّقة فوق الأريكة."},{"en":"She waited at the bus stop opposite the school.","ar":"انتظرت عند موقف الحافلة مقابل المدرسة."}],"notes_ar":"أحيانًا يختلف الإنجليزي عن العربية: in the street قد تكون on في الأمريكية — ركّز على ما في المنهج.","mistakes_ar":"خلط on و in (على الطاولة on؛ في الصندوق in).","compare_ar":"next to قريب جدًا؛ near أوسع؛ between يحتاج شيئين على الأقل.","quiz":[{"question_en":"The lamp is ___ the ceiling.","options":["on","above","in"],"correct":1,"why_ar":"الثريا «فوق» الغرفة نحو السقف → above.","rule_ar":"above for higher position."},{"question_en":"There's a spider ___ the bed.","options":["on","under","at"],"correct":1,"why_ar":"شائع تحت السرير → under.","rule_ar":"under."},{"question_en":"She lives ___ the third floor.","options":["in","on","at"],"correct":1,"why_ar":"on + floor.","rule_ar":"on the floor level."},{"question_en":"The bank is ___ the post office and the cafe.","options":["between","under","on"],"correct":0,"why_ar":"بين مبنيين → between.","rule_ar":"between."},{"question_en":"Put the glasses ___ the cupboard.","options":["in","on","over"],"correct":0,"why_ar":"داخل الخزانة → in.","rule_ar":"in."},{"question_en":"He stood ___ me in the queue.","options":["behind","between","next"],"correct":0,"why_ar":"ورائي في الطابور → behind.","rule_ar":"behind."},{"question_en":"There's a hotel ___ the river.","options":["opposite","under","in"],"correct":0,"why_ar":"مقابل النهر → opposite.","rule_ar":"opposite."},{"question_en":"Your shoes are ___ the door.","options":["next to","between","among"],"correct":0,"why_ar":"بجانب الباب.","rule_ar":"next to."},{"question_en":"The cat jumped ___ the table.","options":["onto","into","at"],"correct":0,"why_ar":"حركة إلى فوق السطح → onto (في هذا السياق التعليمي).","rule_ar":"Movement to surface — onto."},{"question_en":"Sign your name ___ the dotted line.","options":["on","in","under"],"correct":0,"why_ar":"على الخط المنقط.","rule_ar":"on."}]},"plural-nouns":{"categoryId":"unit-2-nouns-place-tense","title_en":"Plural nouns","title_ar":"جمع الأسماء","keywords":["plural","s","es","ies","ves","irregular"],"explanation_ar":"جمع الاسم المنتظم غالبًا بإضافة s؛ بعد s, ch, sh, x, z نستخدم es؛ يـاء متحركة + y نحذف y ونضيف ies؛ حرف ساكن + o غالبًا es؛ استثناءات كثيرة للأفعال الشاذة والأسماء التي لا تتغير.","rule_en":"Regular +s; +es after s/ch/sh/x/z; consonant+y → ies; f/fe → often ves (roof/cliff exceptions); irregular: men, children, feet, mice, etc.; same form: sheep, deer, fish.","table":{"headers":["Rule","Examples"],"rows":[["Regular +s","car → cars, book → books"],["s/ch/sh/x/z + es","bus → buses, box → boxes"],["consonant + y → ies","city → cities, baby → babies"],["vowel + y → s","day → days, boy → boys"],["f/fe → ves (exceptions exist)","leaf → leaves; roof → roofs"],["Irregular","man → men, child → children, foot → feet"],["No change","sheep, deer, fish (often)"]]},"examples":[{"en":"two buses","ar":"حافلتان"},{"en":"three babies","ar":"ثلاثة أطفال رضّع"},{"en":"five wolves","ar":"خمسة ذئاب"},{"en":"many people","ar":"كثير من الناس"}],"notes_ar":"quiz → quizzes بحرفين zz + es. piano و photo غالبًا فقط s.","mistakes_ar":"potatos بدل potatoes؛ یا citys بدل cities.","compare_ar":"صفات المقارنة ليست جمع أسماء؛ لا تخلط -er مع جمع الجملة.","quiz":[{"question_en":"one box, two ___","options":["boxs","boxes","boxies"],"correct":1,"why_ar":"ينتهي بـ x → es.","rule_ar":"+es after x."},{"question_en":"one baby, many ___","options":["babys","babies","baby"],"correct":1,"why_ar":"consonant + y → ies.","rule_ar":"y → ies."},{"question_en":"two ___ (knife)","options":["knifes","knives","knife"],"correct":1,"why_ar":"f → ves.","rule_ar":"knives."},{"question_en":"one man, two ___","options":["mans","men","man"],"correct":1,"why_ar":"شاذ.","rule_ar":"irregular plural men."},{"question_en":"several ___ (child)","options":["childs","children","childrens"],"correct":1,"why_ar":"children.","rule_ar":"irregular."},{"question_en":"two ___ (tomato)","options":["tomatos","tomatoes","tomato"],"correct":1,"why_ar":"consonant + o غالبًا es.","rule_ar":"tomatoes."},{"question_en":"many ___ (sheep)","options":["sheeps","sheep","sheepes"],"correct":1,"why_ar":"نفس الشكل.","rule_ar":"sheep unchanged."},{"question_en":"two ___ (quiz)","options":["quizs","quizzes","quize"],"correct":1,"why_ar":"double z + es.","rule_ar":"quizzes."},{"question_en":"The ___ are on sale (city).","options":["citys","cities","city"],"correct":1,"why_ar":"city → cities.","rule_ar":"consonant + y."},{"question_en":"two ___ (photo)","options":["photos","photoes","photoses"],"correct":0,"why_ar":"استثناء شائع → photos.","rule_ar":"photo → photos."}]},"demonstratives-this-that-these-those":{"categoryId":"unit-2-nouns-place-tense","title_en":"This, that, these, those","title_ar":"This و that و these و those","keywords":["this","that","these","those","demonstratives","near","far"],"explanation_ar":"this و that لمفرد؛ these و those لجمع. غالبًا this/these للقرب الزماني أو المكاني؛ that/those للبعد. تُستخدم قبل اسم أو تشير لوحدها حسب السياق.","rule_en":"This/that + singular noun. These/those + plural noun. This/these → nearer; that/those → farther.","table":{"headers":["Word","Number","Typical distance"],"rows":[["this","singular","near"],["that","singular","far"],["these","plural","near"],["those","plural","far"]]},"examples":[{"en":"I like this apple.","ar":"أحب هذا التفاح."},{"en":"I like that apple.","ar":"أحب ذلك التفاح."},{"en":"I like these apples.","ar":"أحب هذه التفاحات."},{"en":"I like those apples.","ar":"أحب تلك التفاحات."}],"notes_ar":"هذه الأدوات تعمل كصفات تشيرية قبل الاسم؛ لا تخلط this مع جمع.","mistakes_ar":"these apple بدل these apples؛ أو those مع مفرد.","compare_ar":"أدوات الإشارة مختلفة عن he/she/it التي للضمير فقط.","quiz":[{"question_en":"___ shoes here are mine; ___ ones over there are yours.","options":["This / that","These / those","That / these"],"correct":1,"why_ar":"أحذية جمع قريبة وبعيدة → these / those.","rule_ar":"these near, those far."},{"question_en":"Look at ___ bird in the tree!","options":["this","these","those"],"correct":0,"why_ar":"bird مفرد قريب → this.","rule_ar":"this + singular."},{"question_en":"___ students in the back row, please stand.","options":["That","Those","This"],"correct":1,"why_ar":"students جمع وبعيد نسبيًا → Those.","rule_ar":"those + plural."},{"question_en":"I prefer ___ coat (near me).","options":["this","these","those"],"correct":0,"why_ar":"معطف واحد قريب.","rule_ar":"this."},{"question_en":"___ was a great concert we saw last year.","options":["That","These","Those"],"correct":0,"why_ar":"حديث عن تجربة في الماضي البعيد نسبيًا → That.","rule_ar":"that for distant idea/time."},{"question_en":"Are ___ your keys on the table?","options":["this","these","that"],"correct":1,"why_ar":"keys جمع → these.","rule_ar":"these."},{"question_en":"I don't like ___ colours.","options":["that","those","this"],"correct":1,"why_ar":"colours جمع وبعد → those.","rule_ar":"those."},{"question_en":"Give me ___ book on the shelf (you point).","options":["that","these","those"],"correct":0,"why_ar":"كتاب واحد تُشير إليه بعيدًا → that.","rule_ar":"that."},{"question_en":"___ days we're very busy.","options":["This","These","Those"],"correct":1,"why_ar":"days جمع وزمن قريب → These.","rule_ar":"these days."},{"question_en":"Who are ___ people?","options":["this","that","those"],"correct":2,"why_ar":"people جمع وبُعد → those.","rule_ar":"those people."}]},"capital-letters":{"categoryId":"unit-3-writing-routines","title_en":"Capital letters in writing","title_ar":"الأحرف الكبيرة في الكتابة","keywords":["capital","uppercase","proper noun","sentence","Monday","English"],"explanation_ar":"نبدأ الجملة بحرف كبير دائمًا. الأسماء الخاصة (أشخاص، مدن، بلدان)، أيام الأسبوع والشهور، الجنسيات واللغات كصفات، أسماء المؤسسات، وعناوين الكتب والأفلام تُكتب بحسب قواعد الأحرف الكبيرة في الإنجليزية.","rule_en":"Capitalize: sentence beginnings; names and titles (Mr./Ms./Dr.); days and months; places; nationalities and languages; companies; book and film titles (major words).","table":{"headers":["Use a capital for…","Examples"],"rows":[["First word in a sentence","Today is sunny."],["Direct speech","\"Stop that man!\" shouted the officer."],["People & titles","Ms. Ali, Professor Omar"],["Days / months","Friday, August"],["Places / languages","Saudi Arabia; She speaks Arabic."],["Organizations","UNICEF"],["Works (titles)","Harry Potter"]]},"examples":[{"en":"english is fun → English is fun.","ar":"اسم اللغة بحرف كبير."},{"en":"i study on monday. → I study on Monday.","ar":"بداية الجملة واسم اليوم."},{"en":"She lives in riyadh. → She lives in Riyadh.","ar":"اسم مدينة."}],"notes_ar":"في الواجبات والامتحان اتبع القواعد المعيارية وليس أسلوب الشات.","mistakes_ar":"أيام الأسبوع بحروف صغيرة؛ أو french بدل French.","compare_ar":"the بحرف صغير؛ الأسماء الخاصة بحرف كبير.","quiz":[{"question_en":"Which sentence is written correctly?","options":["i love english.","I love English.","i Love english."],"correct":1,"why_ar":"بداية الجملة واسم اللغة بحرف كبير.","rule_ar":"Sentence + proper noun capitalization."},{"question_en":"Choose the correct day:","options":["monday","Monday","MONDAY"],"correct":1,"why_ar":"أيام الأسبوع بحرف كبير في الكتابة الرسمية.","rule_ar":"Capitalize day   function subjectQuizOrdinalLabel(subjectId, sectionId, ordinal) {
    if (

      sectionId === "aggregations" &&
      IMC_CHAPTER_TITLES_AR[ordinal - 1]

      return IMC_CHAPTER_TITLES_AR[ordinal - 1];

  const DEFAULT_QUIZZES_PER_SECTION = 3;

  function subjectById(id) {
    return SUBJECT_CATALOG.find((s) => s.id === id) || null;
  }

  function subjectQuizKey(subjectId, sectionId, ordinal) {
    return `${subjectId}|${sectionId}|${ordinal}`;
  }

  function parseSubjectQuizKey(key) {
    const parts = String(key || "").split("|");
    if (parts.length < 3) return null;
    const subjectId = parts[0];
    const sectionId = parts[1];
    const ordinal = parseInt(parts[2], 10);
    if (!subjectById(subjectId)) return null;
    if (!SUBJECT_TEST_SECTION_IDS.includes(sectionId)) return null;
    if (!Number.isFinite(ordinal) || ordinal < 1) return null;
    return { subjectId, sectionId, ordinal };
  }

  function countQuizzesForSection(sub, sectionId) {
    if (!sub) return DEFAULT_QUIZZES_PER_SECTION;
    const raw = sub.sectionQuizCounts && sub.sectionQuizCounts[sectionId];
    if (raw === 0) return 0;
    if (raw === undefined || raw === null) return DEFAULT_QUIZZES_PER_SECTION;
    return Math.max(1, Number(raw) || DEFAULT_QUIZZES_PER_SECTION);
  }

  function maxOrdinalInBank(subjectId, sectionId) {
    const prefix = `${subjectId}|${sectionId}|`;
    let max = 0;
    for (const k of Object.keys(byQuiz)) {
      if (!k.startsWith(prefix)) continue;
      const ord = parseInt(k.slice(prefix.length), 10);
      if (Number.isFinite(ord)) max = Math.max(max, ord);
    }
    return max;
  }

  function ordinalsToShowForSection(sub, sectionId) {
    const bankMax = maxOrdinalInBank(sub.id, sectionId);
    const cfg = countQuizzesForSection(sub, sectionId);
    const cfgSlots = cfg === 0 ? 0 : cfg;
    const total = Math.max(bankMax, cfgSlots);
    if (total === 0) return [];
    return Array.from({ length: total }, (_, i) => i + 1);
  }

        st.answered = null;
        st.ok = null;

      state.session.activeIdx = 0;

      let ix = uniq.findIndex((id) => state.qs[id]?.answered === null);
      if (ix < 0) ix = 0;

  /** Turn long comma-separated unit descriptions into a scannable list (Arabic comma ، or Latin comma). */
  function grammarScopeDescHtml(text) {
    const raw = String(text || "").trim();
    if (!raw) return "";
    let parts = raw.split(/\s*،\s*/).map((s) => s.trim()).filter(Boolean);
    if (parts.length <= 1) {
      parts = raw.split(/\s*,\s*/).map((s) => s.trim()).filter(Boolean);
    }
    if (parts.length <= 1) {
      return `<p class="gram-scope-plain">${esc(raw)}</p>`;
    }
    return `<ul class="gram-scope-list" role="list">${parts.map((p) => `<li>${esc(p)}</li>`).join("")}</ul>`;
  }

  /** Arabic notes / mistakes: relaxed blocks + same comma→list behavior as unit descriptions */
  function grammarArabicFlowHtml(raw) {
    const s = String(raw || "").trim();
    if (!s) return "";
    const listed = grammarScopeDescHtml(s);
    if (listed.includes("gram-scope-list")) {
      return `<div class="gram-ar-flow" dir="rtl">${listed}</div>`;
    }
    const paras = s.split(/\n+/).map((x) => x.trim()).filter(Boolean);
    if (paras.length > 1) {
      return `<div class="gram-ar-flow" dir="rtl">${paras.map((p) => `<p class="gram-ar-block">${esc(p)}</p>`).join("")}</div>`;
    }
    return `<div class="gram-ar-flow" dir="rtl"><p class="gram-ar-block">${esc(s)}</p></div>`;
  }

  /** English rule section line-starts — unified card layout (إثبات / نفي / سؤال وأمثالها) */
  const GRAMMAR_RULE_SECTION_PATTERN =
    "Affirmative|Negative|Questions|Positive|Usage(?:\\s+form)?|Form|Structure|Meaning|Summary|Examples?|Notes?|Pattern|Statement";

  function grammarRuleSectionHeaderRe() {
    return new RegExp(`^(${GRAMMAR_RULE_SECTION_PATTERN})\\s*(?:[:：]\\s*)?(?:[—–-]\\s*)?(.*)$`, "i");
  }

  function grammarSectionArabicFallback(normKey) {
    const k = String(normKey || "")
      .toLowerCase()
      .trim();
    const map = {
      affirmative: "gramRuleLblAff",
      positive: "gramRuleLblAff",
      negative: "gramRuleLblNeg",
      questions: "gramRuleLblQ",
      "usage form": "gramRuleLblUsage",
      usage: "gramRuleLblUsage",
      form: "gramRuleLblForm",
      structure: "gramRuleLblStructure",
      meaning: "gramRuleLblMeaning",
      summary: "gramRuleLblSummary",
      examples: "gramRuleLblExamples",
      example: "gramRuleLblExample",
      notes: "gramRuleLblNotes",
      pattern: "gramRuleLblPattern",
      statement: "gramRuleLblStatement",
    };
    const mk = map[k];
    return mk ? String(t(mk)).trim() : "";
  }

  function prettyEnglishSectionTitle(rawHeader) {
    return String(rawHeader || "")
      .trim()
      .toLowerCase()
      .replace(/\b[a-z]/g, (c) => c.toUpperCase());
  }

  /** True if short Arabic gloss on section header line (e.g. إثبات) vs English rule text */
  function grammarRuleLineIsArabicGloss(seg) {
    const s = String(seg || "").trim();
    if (!s) return false;
    const latin = (s.match(/[a-zA-Z]/g) || []).length;
    const hasAr = /[\u0600-\u06FF]/.test(s);
    return hasAr && latin < 5;
  }

  /** Split dense crib lines (; or middle dot ·) into spaced blocks */
  function grammarRuleOneVisualLine(ln) {
    const s = String(ln || "").trim();
    if (!s) return "";
    let parts = s.split(/\s*;\s*/).map((x) => x.trim()).filter(Boolean);
    if (parts.length <= 1) {
      const dotParts = s.split(/\s*·\s*/).map((x) => x.trim()).filter(Boolean);
      if (dotParts.length > 1) parts = dotParts;
    }
    if (parts.length > 1) {
      return `<div class="gram-rule-clauses" dir="ltr">${parts.map((c) => `<div class="gram-rule-clause">${esc(c)}</div>`).join("")}</div>`;
    }
    return `<p class="gram-rule-line" dir="ltr">${esc(s)}</p>`;
  }

  /** One visual block per source line; semicolons inside a line become stacked clauses */
  function grammarRuleBodyLines(body) {
    const lines = String(body || "")
      .split(/\n+/)
      .map((l) => l.trim())
      .filter(Boolean);
    if (!lines.length) return "";
    return lines.map((ln) => grammarRuleOneVisualLine(ln)).join("");
  }

  function grammarRuleEnLooksMultiline(text) {
    const tx = String(text || "").replace(/\r\n/g, "\n");
    if (!tx.trim()) return false;
    const reLine = new RegExp(`\\n\\s*(?:${GRAMMAR_RULE_SECTION_PATTERN})\\b`, "i");
    if (reLine.test(tx)) return true;
    const reFirst = new RegExp(`^(?:${GRAMMAR_RULE_SECTION_PATTERN})\\b[^\\n]{0,240}\\n`, "im");
    return reFirst.test(tx);
  }

  /** Section headers at line start + colon forms (same visual rhythm everywhere) */
  function grammarFormatRuleEnMultiline(text) {
    const lines = text.replace(/\r\n/g, "\n").split("\n");
    const headerRe = grammarRuleSectionHeaderRe();
    const blocks = [];
    const preambleLines = [];
    /** @type {{ headerRaw: string, gloss: string, lines: string[] } | null} */
    let cur = null;

    function flush() {
      if (!cur) return;
      const body = cur.lines.join("\n").trim();
      const titleEn = prettyEnglishSectionTitle(cur.headerRaw);
      const normKey = cur.headerRaw.toLowerCase().replace(/\s+/g, " ").trim();
      const labFallback = grammarSectionArabicFallback(normKey);
      const glossRaw = (cur.gloss && cur.gloss.trim()) || labFallback;
      const headHtml = glossRaw
        ? `<div class="gram-rule-head"><span class="gram-rule-kind" dir="ltr">${esc(titleEn)}</span><span class="gram-rule-head-sep" aria-hidden="true">—</span><span class="gram-rule-gloss">${esc(glossRaw)}</span></div>`
        : `<div class="gram-rule-head gram-rule-head-enonly"><span class="gram-rule-kind" dir="ltr">${esc(titleEn)}</span></div>`;
      const bodyHtml = grammarRuleBodyLines(body);
      blocks.push(`<div class="gram-rule-block">${headHtml}<div class="gram-rule-body">${bodyHtml}</div></div>`);
      cur = null;
    }

    for (const line of lines) {
      const m = line.match(headerRe);
      if (m) {
        flush();
        const rest = (m[2] || "").trim();
        cur = { headerRaw: m[1], gloss: "", lines: [] };
        if (rest && grammarRuleLineIsArabicGloss(rest)) {
          cur.gloss = rest;
        } else if (rest) {
          cur.lines.push(rest);
        }
      } else if (cur) {
        cur.lines.push(line);
      } else if (line.trim()) {
        preambleLines.push(line);
      }
    }
    flush();

    const preambleRaw = preambleLines.join("\n").trim();
    const preambleHtml = preambleRaw
      ? `<div class="gram-rule-preamble">${grammarRuleBodyLines(preambleRaw)}</div>`
      : "";

    return preambleHtml + blocks.join("");
  }

  /** Inline Affirmative: … Negative: … + same section keywords */
  function grammarFormatRuleEn(raw) {
    let text = String(raw || "").trim().replace(/\r\n/g, "\n");
    if (!text) return `<p class="empty">${esc(t("quizEmptySoon"))}</p>`;

    if (grammarRuleEnLooksMultiline(text)) {
      const out = grammarFormatRuleEnMultiline(text);
      return out || `<div class="gram-rule-block"><div class="gram-rule-body" dir="ltr">${grammarRuleBodyLines(text)}</div></div>`;
    }

    text = text.replace(new RegExp(`;\\s*(?=(?:${GRAMMAR_RULE_SECTION_PATTERN})\\s*:)`, "gi"), " ");
    const parts = text.split(new RegExp(`\\s+(?=(?:${GRAMMAR_RULE_SECTION_PATTERN})\\s*:)`, "i"));
    const blocks = [];
    const partHdr = new RegExp(`^(${GRAMMAR_RULE_SECTION_PATTERN})\\s*:\\s*(.*)$`, "is");
    for (const part of parts) {
      const p = part.trim();
      if (!p) continue;
      const m = p.match(partHdr);
      if (m) {
        const normKey = m[1].toLowerCase().replace(/\s+/g, " ").trim();
        const titleEn = prettyEnglishSectionTitle(m[1]);
        const labHint = grammarSectionArabicFallback(normKey);
        const headHtml = labHint
          ? `<div class="gram-rule-head"><span class="gram-rule-kind" dir="ltr">${esc(titleEn)}</span><span class="gram-rule-head-sep" aria-hidden="true">—</span><span class="gram-rule-gloss">${esc(labHint)}</span></div>`
          : `<div class="gram-rule-head gram-rule-head-enonly"><span class="gram-rule-kind" dir="ltr">${esc(titleEn)}</span></div>`;
        const inner = grammarRuleBodyLines(m[2].trim()) || `<p class="gram-rule-line" dir="ltr">${esc(m[2].trim())}</p>`;
        blocks.push(`<div class="gram-rule-block">${headHtml}<div class="gram-rule-body" dir="ltr">${inner}</div></div>`);
      } else {
        blocks.push(
          `<div class="gram-rule-block"><div class="gram-rule-body" dir="ltr">${grammarRuleBodyLines(p) || `<p class="gram-rule-line" dir="ltr">${esc(p)}</p>`}</div></div>`,
        );
      }
    }
    return blocks.length
      ? blocks.join("")
      : `<div class="gram-rule-block"><div class="gram-rule-body" dir="ltr">${grammarRuleBodyLines(text) || `<p class="gram-rule-line" dir="ltr">${esc(text)}</p>`}</div></div>`;
  }

  /** Answered count vs total — remaining derived for one-line progress hints */
  function fmtAnswerRemainLine(msgKey, answeredCount, totalQuestions) {
    const tot = Math.max(0, Number(totalQuestions) || 0);
    let a = Number(answeredCount);
    if (!Number.isFinite(a)) a = 0;
    a = clamp(Math.floor(a), 0, tot);
    const r = Math.max(0, tot - a);
    return t(msgKey).replace(/\{\{a\}\}/g, String(a)).replace(/\{\{tot\}\}/g, String(tot)).replace(/\{\{r\}\}/g, String(r));
  }

  function shuffle(a) {
    const arr = a.slice();
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  function vocabQuizEligible(all) {

    const k = String(row.en || "")

      .trim();
    if (typeof VOCAB_WORD_PHASE === "undefined" || !VOCAB_WORD_PHASE) return "vp_general";
    return VOCAB_WORD_PHASE[k] || "vp_general";
  }

  function vocabRowsForPhaseFilter(all, phaseId) {
    const el = vocabQuizEligible(all);
    if (!phaseId || phaseId === "all") return el;
    return el.filter((r) => vocabPhaseIdForRow(r) === phaseId);
  }

  function vocabCountForPhase(all, phaseId) {

  function pickDefaultPhaseForQuiz(all) {

  function vocabPhaseDisplayTitle(phaseId) {

    const def = typeof VOCAB_PHASE_DEFS !== "undefined" ? VOCAB_PHASE_DEFS[phaseId] : null;
    if (!def) return phaseId;
    return lang === "ar" ? def.title_ar : def.title_en;

  function buildArMc(pool, curIdx) {
    const cur = pool[curIdx];
    const correct = cur.ar;
    const wrongSet = [];
    for (let i = 0; i < pool.length; i++) {
      if (i === curIdx) continue;
      const a = pool[i].ar;
      if (a && a !== correct && !wrongSet.includes(a)) wrongSet.push(a);
    }
    shuffle(wrongSet);
    const need = Math.min(3, wrongSet.length);
    const wrong = wrongSet.slice(0, need);
    const merged = shuffle([correct, ...wrong]);
    return { opts: merged, correctIdx: merged.indexOf(correct) };
  }

  function beep(ok) {
    if (!soundOn) return;
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.type = "sine";
      const n = ctx.currentTime;
      o.frequency.setValueAtTime(ok ? 760 : 280, n);
      g.gain.setValueAtTime(0.0001, n);
      g.gain.exponentialRampToValueAtTime(0.06, n + 0.02);
      g.gain.exponentialRampToValueAtTime(0.0001, n + 0.1);
      o.connect(g);
      g.connect(ctx.destination);
      o.start(n);
      o.stop(n + 0.11);
    } catch (_) {}
  }

      if (!p.daily || typeof p.daily.day !== "string") p.daily = { day: new Date().toISOString().slice(0, 10), answered: 0 };

      if (p.daily.day !== today) p.daily = { day: today, answered: 0 };

      if (typeof p.session.activeSubjectId !== "string") p.session.activeSubjectId = "";
      if (typeof p.session.activeTestSectionId !== "string") p.session.activeTestSectionId = "";

  function normalize(raw) {
    const opts = Array.isArray(raw.options) ? raw.options.map(String) : [];
    let c = raw.correct;
    if (typeof c !== "number") c = parseInt(String(c), 10);
    if (!Number.isFinite(c)) c = 0;
    c = clamp(c, 0, Math.max(0, opts.length - 1));
    return {
      id: String(raw.id),
      quiz: String(raw.quiz || QUIZ_ORDER[0] || ""),
      question: String(raw.question_en ?? raw.question ?? ""),
      options: opts,
      correctIndex: c,
      arabic_explanation: String(raw.arabic_explanation || ""),
      why_answer_ar: String(raw.why_answer_ar || ""),
      grammar_rule_ar: String(raw.grammar_rule_ar || ""),
      vocabulary: String(raw.vocabulary || ""),
      common_mistake_ar: String(raw.common_mistake_ar || ""),
      example_sentence_en: String(raw.example_sentence_en || ""),
      false_explanation: String(raw.false_explanation || ""),
      sentence_translation_ar: String(raw.sentence_translation_ar || raw.translation_ar || ""),
      needs_review: !!raw.needs_review,
    };
  }

  function vocabMap(q) {
    const m = Object.create(null);
    for (const p of q.vocabulary.split("|")) {
      const seg = p.trim();
      if (!seg) continue;
      const eq = seg.split("=");
      if (eq.length >= 2) {
        const w = eq[0].trim().toLowerCase().replace(/^['']|['']$/g, "");
        const ar = eq.slice(1).join("=").trim();
        if (w) m[w] = ar;
      }
    }
    return m;
  }

  function stripOptPrefix(s) {
    return String(s).replace(/^(?:[a-zA-Z]\.\s*|[A-Z]\.\s*)/, "").trim();
  }

  let _vocabCuratedMapCache = null;
  function vocabCuratedMap() {
    if (_vocabCuratedMapCache) return _vocabCuratedMapCache;
    const m = Object.create(null);
    if (typeof VOCAB_BANK !== "undefined" && Array.isArray(VOCAB_BANK)) {
      for (const pair of VOCAB_BANK) {
        if (!pair || pair.length < 2) continue;
        const k = String(pair[0]).toLowerCase().trim();
        if (k) m[k] = pair[1];
      }
    }
    _vocabCuratedMapCache = m;
    return _vocabCuratedMapCache;
  }

  function vocabBlocksForQuestion(q) {
    const map = { ...vocabMap(q), ...EXTRA_HINTS, ...vocabCuratedMap() };
    const bank = [];
    const covered = new Set();
    for (const p of q.vocabulary.split("|")) {
      const seg = p.trim();
      if (!seg) continue;
      const eq = seg.split("=");
      if (eq.length >= 2) {
        const w = eq[0].trim();
        const ar = eq.slice(1).join("=").trim();
        const keyFull = w.toLowerCase().replace(/^['']|['']$/g, "");
        if (!keyFull) continue;
        bank.push({ en: w, ar: ar || t("noTr") });
        for (const part of keyFull.split(/\s+/)) {
          const norm = part.replace(/[^a-z']/gi, "");
          if (norm) covered.add(norm);
        }
      }
    }
    const auto = [];
    const seen = new Set();
    const blob = q.question + " " + q.options.map(stripOptPrefix).join(" ");
    const re = /\b[A-Za-z]+(?:'[A-Za-z]+)?\b/g;
    let mt;
    while ((mt = re.exec(blob))) {
      const w = mt[0];
      const k = w.toLowerCase();
      const norm = k.replace(/[^a-z']/gi, "");
      if (w.length < 2 || !norm || covered.has(norm) || seen.has(k)) continue;
      seen.add(k);
      auto.push({ en: w, ar: map[k] || map[norm] || t("noTr") });
    }
    return { bank, auto };
  }

  function vocSheetHtml(rows) {
    if (!rows.length) return "";
    return rows
      .map(
        (r) =>
          `<div class="voc-row"><span class="voc-en">${esc(r.en)}</span><span class="voc-eq">=</span><span class="voc-ar">${esc(r.ar)}</span></div>`
      )
      .join("");
  }

  function htmlVocabPanels(q) {
    const vb = vocabBlocksForQuestion(q);
    let html = "";
    if (vb.bank.length) {
      html += `<h5>${esc(t("vocFromBank"))}</h5><div class="voc-sheet">${vocSheetHtml(vb.bank)}</div>`;
    }
    if (vb.auto.length) {
      html += `<h5>${esc(t("vocAuto"))}</h5><div class="voc-sheet voc-sheet-auto">${vocSheetHtml(vb.auto)}</div>`;
    }
    if (!html) html = `<div class="empty" style="padding:14px;text-align:center">${esc(t("vocEmpty"))}</div>`;
    return html;
  }

  function translateParagraph(q) {
    if (q.sentence_translation_ar.trim()) return q.sentence_translation_ar.trim();
    const parts = [q.arabic_explanation, q.why_answer_ar].filter(Boolean);
    return parts.join(" ") || (lang === "ar" ? "لا توجد ترجمة جملة مخصصة بعد." : "No dedicated sentence translation yet.");
  }

  function allVocabAgg() {
    const g = new Map();
    const upsert = (row, fromBank) => {
      const k = row.en.toLowerCase();
      const prev = g.get(k);
      const ar = row.ar;
      const good = ar && ar !== t("noTr");
      if (!prev) {
        g.set(k, { en: row.en, ar, isBank: fromBank });
        return;
      }
      const prevGood = prev.ar && prev.ar !== t("noTr");
      if (fromBank && !prev.isBank) {
        g.set(k, { en: row.en, ar: good ? ar : prev.ar, isBank: true });
      } else if (!prevGood && good) {
        g.set(k, { ...prev, ar });
      } else if (fromBank && good && prev.ar !== ar) {
        g.set(k, { ...prev, ar, isBank: true });
      }
    };
    if (typeof VOCAB_BANK !== "undefined" && Array.isArray(VOCAB_BANK)) {
      for (const pair of VOCAB_BANK) {
        if (!pair || pair.length < 2) continue;
        upsert({ en: pair[0], ar: pair[1] }, true);
      }
    }
    for (const q of questions) {
      const vb = vocabBlocksForQuestion(q);
      vb.bank.forEach((row) => upsert(row, true));
      vb.auto.forEach((row) => upsert(row, false));
    }
    const grammarWordRowsFromItem = (it) => {
      const map = { ...EXTRA_HINTS, ...vocabCuratedMap() };
      const blob = [it.question_en || "", ...((it.options || []).map(String))].join(" ");
      const re = /\b[A-Za-z]+(?:'[A-Za-z]+)?\b/g;
      const rows = [];
      const seen = new Set();
      let mt;
      while ((mt = re.exec(blob))) {
        const w = mt[0];
        const k = w.toLowerCase();
        if (seen.has(k)) continue;
        seen.add(k);
        const norm = k.replace(/[^a-z']/gi, "");
        if (w.length < 2 || !norm) continue;
        const ar = map[k] || map[norm] || t("noTr");
        rows.push({ en: w, ar });
      }
      return rows;
    };
    if (Array.isArray(grammarQuizPoolAll)) {
      for (const it of grammarQuizPoolAll) {
        grammarWordRowsFromItem(it).forEach((row) => upsert(row, false));
      }
    }
    try {
      const blend = grammarAuditReadJson("blended-unique-quiz-json");
      const bItems = blend && Array.isArray(blend.items) ? blend.items : [];
      for (const it of bItems) {
        grammarWordRowsFromItem(it).forEach((row) => upsert(row, false));
      }
    } catch (_) {}
    return [...g.values()].sort((a, b) => a.en.localeCompare(b.en));
  }

  /** Map for hover translations on grammar quiz stems + options (merged with bank hints). */
  function grammarQuizWordMap(item) {
    if (!item) return { ...EXTRA_HINTS, ...vocabCuratedMap() };
    const base = { ...EXTRA_HINTS, ...vocabCuratedMap() };
    const out = Object.assign(Object.create(null), base);
    const blob = [item.question_en || "", ...((item.options || []).map(String))].join(" ");
    const re = /\b[A-Za-z]+(?:'[A-Za-z]+)?\b/g;
    let mt;
    while ((mt = re.exec(blob))) {
      const w = mt[0];
      const k = w.toLowerCase();
      const norm = k.replace(/[^a-z']/gi, "");
      if (w.length < 2 || !norm) continue;
      if (!out[k]) {
        const tr = base[k] || base[norm] || t("noTr");
        out[k] = tr;
        if (norm && norm !== k) out[norm] = tr;
      }
    }

  /** Text of the reading passage (before comprehension lines). */
  function readingPassageExtract(q) {
    const full = String(q.question || "");
    const lower = full.toLowerCase();
    const needle = "read the text:";
    const ix = lower.indexOf(needle);
    if (ix < 0) return full.replace(/\s+/g, " ").trim().slice(0, 500);
    let rest = full.slice(ix + needle.length).trim();
    const lines = rest.split(/\n/);
    const kept = [];
    for (let i = 0; i < lines.length; i++) {
      const line = lines[i].trim();
      if (!line) {
        if (kept.length > 0) break;
        continue;
      }
      if (/\.{4,}/.test(line)) break;
      if (/^(choose|select|complete|fill in|answer)\b/i.test(line)) break;
      kept.push(line);
      if (kept.join("\n").length > 4000) break;
    }
    const joined = kept.join("\n").trim();
    return joined || rest.replace(/\s+/g, " ").trim().slice(0, 500);
  }

  function readingLessonsDeduped(rq) {
    const seen = new Map();
    for (const q of rq) {
      const body = readingPassageExtract(q);
      const key = body.replace(/\s+/g, " ").trim().slice(0, 1500) || `__id:${q.id}`;
      if (!seen.has(key)) seen.set(key, q);
    }
    return [...seen.values()];
  }

  function readingGroupByQuiz(rq) {

        map[qz] = [];
        order.push(qz);

      map[qz].push(q);
    }
    for (const k of order) {
      map[k].sort((a, b) => a.id.localeCompare(b.id, undefined, { numeric: true }));
    }
    return { order, map };

  function grammarEnsureQuizState(lessonId) {
    const L = grammarLessonsById[lessonId];
    if (!L) return null;
    const exCount = (L.examples || []).length;
    const stages = Array.isArray(L.quizStages) ? L.quizStages : null;
    const finalQs = Array.isArray(L.quizComprehensive) ? L.quizComprehensive : null;

    if (stages && stages.length > 0 && finalQs && finalQs.length > 0) {
      if (!grammarLessonQuiz[lessonId] || !grammarLessonQuiz[lessonId].multi) {
        grammarLessonQuiz[lessonId] = {
          multi: true,
          exPos: 0,
          stages: stages.map((s) => ({
            picks: Array((s.quiz || []).length).fill(null),
            quizPos: 0,
          })),
          final: { picks: Array(finalQs.length).fill(null), quizPos: 0 },
        };
      } else {
        const st = grammarLessonQuiz[lessonId];
        const nextStages = stages.map((s, i) => {
          const n = (s.quiz || []).length;
          const prev = st.stages && st.stages[i];
          if (prev && Array.isArray(prev.picks) && prev.picks.length === n) return prev;
          return { picks: Array(n).fill(null), quizPos: 0 };
        });
        st.stages = nextStages;
        if (!st.final || !Array.isArray(st.final.picks) || st.final.picks.length !== finalQs.length) {
          st.final = { picks: Array(finalQs.length).fill(null), quizPos: 0 };
        }
        if (typeof st.exPos !== "number") st.exPos = 0;
        if (exCount > 0) st.exPos = Math.min(st.exPos, exCount - 1);
        else st.exPos = 0;
      }
      return grammarLessonQuiz[lessonId];
    }

    const flatQuiz = Array.isArray(L.quiz) ? L.quiz : [];
    const n = flatQuiz.length;
    if (!grammarLessonQuiz[lessonId] || grammarLessonQuiz[lessonId].multi) {
      grammarLessonQuiz[lessonId] = { picks: Array(n).fill(null), quizPos: 0, exPos: 0 };
    }
    const st = grammarLessonQuiz[lessonId];
    if (typeof st.quizPos !== "number" || st.quizPos < 0) st.quizPos = 0;
    if (typeof st.exPos !== "number" || st.exPos < 0) st.exPos = 0;
    if (!Array.isArray(st.picks) || st.picks.length !== n) {
      st.picks = Array(n).fill(null);
      st.quizPos = 0;
    }
    if (n > 0) st.quizPos = Math.min(st.quizPos, n - 1);
    else st.quizPos = 0;
    if (exCount > 0) st.exPos = Math.min(st.exPos, exCount - 1);
    else st.exPos = 0;
    return st;
  }

  function grammarLessonComplete(lessonId) {
    const L = grammarLessonsById[lessonId];
    if (!L) return false;
    const st = grammarLessonQuiz[lessonId];
    if (!st) return false;
    if (st.multi) {
      const stagesOk =
        Array.isArray(st.stages) &&
        st.stages.every((s) => s.picks.every((x) => x !== null && x !== undefined));
      const finalOk =
        st.final &&
        Array.isArray(st.final.picks) &&
        st.final.picks.every((x) => x !== null && x !== undefined);
      return stagesOk && finalOk;
    }
    if (!Array.isArray(L.quiz)) return false;
    return st.picks.every((x) => x !== null && x !== undefined);
  }

  function tokenizeEn(el, text, map) {
    el.textContent = "";
    const escapeRe = (s) => String(s).replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
    const cleanKey = (s) => String(s).toLowerCase().trim().replace(/^['']|['']$/g, "");
    const phraseKeys = Object.keys(map || {})
      .map(cleanKey)
      .filter((k) => k && k.includes(" ") && /^[a-z' ]+$/.test(k))
      .sort((a, b) => b.length - a.length);

    const emitWords = (chunk) => {
      const re = /([A-Za-z]+(?:'[A-Za-z]+)?)|([^A-Za-z]+)/g;
      let m;
      while ((m = re.exec(chunk))) {
        if (m[1]) {
          const sp = document.createElement("span");
          sp.className = "w-token";
          sp.textContent = m[1];
          sp.dataset.w = cleanKey(m[1]);
          el.appendChild(sp);
        } else el.appendChild(document.createTextNode(m[2] || ""));
      }
    };

    if (!phraseKeys.length) {
      emitWords(text);
      wireTokens(el, map);
      return;
    }

    // Phrase-aware tokenization (e.g. "air conditioner") using keys from your own vocab data.
    const phraseRe = new RegExp(
      `\\b(?:${phraseKeys.map((k) => escapeRe(k).replace(/\\s+/g, "\\\\s+")).join("|")})\\b`,
      "gi",
    );
    let last = 0;
    let mt;
    while ((mt = phraseRe.exec(text))) {
      const start = mt.index;
      const end = start + mt[0].length;
      if (start > last) emitWords(text.slice(last, start));
      const sp = document.createElement("span");
      sp.className = "w-token";
      sp.textContent = mt[0];
      sp.dataset.w = cleanKey(mt[0]).replace(/\s+/g, " ");
      el.appendChild(sp);
      last = end;
    }
    if (last < text.length) emitWords(text.slice(last));
    wireTokens(el, map);
  }

  function wireTokens(root, map) {
    const tip = $("#wtip");
    let longPress = null;
    const show = (sp, clientX, clientY) => {
      const w = sp.dataset.w || "";
      const curMap = vocabCuratedMap();
      let ar = map[w] || EXTRA_HINTS[w] || curMap[w] || t("noTr");
      tip.style.display = "block";
      tip.innerHTML = `<b>${esc(sp.textContent)}</b><div>${esc(ar)}</div>`;
      const r = sp.getBoundingClientRect();
      let x = r.left + r.width / 2 - tip.offsetWidth / 2;
      let y = r.bottom + 8;
      if (clientX) {
        x = clientX - tip.offsetWidth / 2;
        y = clientY + 12;
      }
      x = clamp(x, 8, innerWidth - tip.offsetWidth - 8);
      y = clamp(y, 8, innerHeight - tip.offsetHeight - 8);
      tip.style.left = x + "px";
      tip.style.top = y + "px";
    };
    const isTouch = "ontouchstart" in window;
    root.querySelectorAll(".w-token").forEach((sp) => {
      sp.addEventListener("mouseenter", () => {
        if (isTouch) return;
        show(sp);
      });
      sp.addEventListener("mouseleave", () => {
        if (isTouch) return;
        tip.style.display = "none";
      });
      sp.addEventListener("touchstart", (e) => {
        clearTimeout(longPress);
        const touch = e.touches[0];
        longPress = setTimeout(() => {
          show(sp, touch.clientX, touch.clientY);
          navigator.vibrate?.(12);
        }, 480);
      }, { passive: true });
      sp.addEventListener("touchend", () => clearTimeout(longPress));
      sp.addEventListener("touchmove", () => {
        clearTimeout(longPress);
        tip.style.display = "none";
      });
    });
  }

  function parseRoute() {
    const raw = (location.hash || "#/").replace(/^#\/?/, "");
    const parts = raw.split("/").filter(Boolean);

    testsSubjectId = "";
    testsSubjectSectionId = "";
    testsSubjectMode = "";
    reviewSubjectId = "";
    studySubjectId = "";

    /** `#/` أو بدون مسار → الشاشة الرئيسية مع التحية (صباح/مساء) */
    if (!parts.length) {
      route = "home";
      return;
    }

    const top = parts[0];

    if (top === "tests") {
      if (!parts[1]) {
        try {
          const want = `${location.pathname}${location.search}#/`;
          if (location.hash !== "#/" && location.hash !== "#") {
            history.replaceState(history.state, "", want);
          }
        } catch (_) {}
        route = "home";
        return;
      }
      route = "tests";
      testsSubjectId = decodeURIComponent(parts[1]);
      if (parts[2]) {
        const sec = decodeURIComponent(parts[2]);
        if (SUBJECT_TEST_SECTION_IDS.includes(sec)) testsSubjectSectionId = sec;
      }
      if (parts[3]) testsSubjectMode = decodeURIComponent(parts[3]);
      return;
    }

    if (top === "quiz") {
      route = "quiz";
      if (parts[1]) state.session.activeQuiz = decodeURIComponent(parts[1]);
      return;
    }

    if (top === "study") {
      route = "study";
      if (parts[1]) studySubjectId = decodeURIComponent(parts[1]);
      return;
    }

    if (top === "review") {
      route = "review";
      if (parts[1]) reviewSubjectId = decodeURIComponent(parts[1]);
      return;
    }

    const ok = ["tests", "quiz", "review", "study"];
    route = ok.includes(top) ? top : "home";
  }

  function getEvtEl(e) {
    const t = e && e.target;
    // Some browsers may target Text nodes or SVG sub-elements.
    if (t && t.nodeType === 1) return t; // Element
    if (t && t.parentElement) return t.parentElement;

  // Global in-app navigation handler.
  // Capture phase so it still works even if some UI stops bubbling.

  const onNav = (e) => {

    if (!el || !el.closest) return;

    if (!h) return;
    if (!navToHashMaybe(h)) return;
    e.preventDefault?.();

  function grammarFinalizeResults() {
    if (!grammarFinalSession || grammarFinalSession.phase !== "run") return;
    const S = grammarFinalSession;
    if (S.intervalId) {
      clearInterval(S.intervalId);
      S.intervalId = null;
    }
    let score = 0;
    const items = S.items.map((it, i) => {
      const ok = S.picks[i] === it.correct;
      if (ok) score++;
      const lesson = grammarLessonsById[it.lessonId];
      return {
        ...it,
        pick: S.picks[i],
        lessonTitle: lesson ? lesson.title_en : "",
      };
    });
    const total = items.length;
    const pct = total ? Math.round((score / total) * 100) : 0;
    grammarFinalSession = {
      phase: "done",
      results: { score, total, pct, items },
    };
  }

  function grammarFinalizeBlendedResults() {
    if (!grammarBlendedSession || grammarBlendedSession.phase !== "run") return;
    const S = grammarBlendedSession;
    if (S.intervalId) {
      clearInterval(S.intervalId);
      S.intervalId = null;
    }
    let score = 0;
    const items = S.items.map((it, i) => {
      const ok = S.picks[i] === it.correct;
      if (ok) score++;
      const lesson = grammarLessonsById[it.lessonId];
      return {
        ...it,
        pick: S.picks[i],
        lessonTitle: lesson ? lesson.title_en : String(it.lessonId || ""),
      };
    });
    const total = items.length;
    const pct = total ? Math.round((score / total) * 100) : 0;
    grammarBlendedSession = {
      phase: "done",
      results: { score, total, pct, items },
    };
  }

  function grammarCategoryById(catId) {
    const G = typeof GRAMMAR_DATA !== "undefined" ? GRAMMAR_DATA : { categories: [] };
    return (G.categories || []).find((c) => c.id === catId);
  }

  /** Lesson quizzes pooled for one grammar category (unit exam). */
  function grammarQuizPoolForCategory(catId) {
    const cat = grammarCategoryById(catId);
    if (!cat) return [];
    const slugs = new Set(cat.lesson_slugs || []);
    return grammarQuizPoolAll.filter((it) => slugs.has(it.lessonId));
  }
