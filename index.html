  function quizBackHash() {
    if (state.session.quizMode === "customQuiz" && state.session.activeQuiz === IMC_COMPREHENSIVE_QUIZ_KEY) {
      return "#/tests/integrated-marketing-comms/aggregations";
    }
    if (state.session.quizMode === "mistakeReview") {
      const sid = state.session.activeSubjectId || subjectIdFromQuizKey(state.session.activeQuiz || "");
      return sid ? "#/tests/" + encodeURIComponent(sid) : "#/";
    }
    if (state.session.quizMode === "review") return reviewRouteHashFromSession();
    let sid = state.session.activeSubjectId;
    if (!sid) sid = subjectIdFromQuizKey(state.session.activeQuiz || "");
    const sec = state.session.activeTestSectionId || "";
    if (sid && sec && SUBJECT_TEST_SECTION_IDS.includes(sec)) {
      const mode = state.session.activeTestMode || "";
      if (sid === "integrated-marketing-comms" && sec === "aggregations" && mode === "lectures") {
        return "#/tests/" + encodeURIComponent(sid) + "/" + encodeURIComponent(sec) + "/lectures";
      }
      return "#/tests/" + encodeURIComponent(sid) + "/" + encodeURIComponent(sec);
    }
    return sid ? "#/tests/" + encodeURIComponent(sid) : "#/";
  }

  function renderQuiz() {
    clearTimeout(window.__falseExplainAutoTimer);
    clearInterval(window.__falseExplainAutoTicker);
    const v = $("#view");
    let isMistakeReview = state.session.quizMode === "mistakeReview";
    let isCustomQuiz = state.session.quizMode === "customQuiz" && state.session.activeQuiz === IMC_COMPREHENSIVE_QUIZ_KEY;
    let isReviewQuiz =
      state.session.quizMode === "review" && state.session.activeQuiz === REVIEW_SESSION_QUIZ_KEY;
    let qb = quizBackHash();
    const name = state.session.activeQuiz || QUIZ_ORDER[0];
    let list;
    if (isMistakeReview) {
      list = (state.session.reviewQuizIds || [])
        .map((id) => questions.find((x) => x.id === id))
        .filter(Boolean);
    } else if (isReviewQuiz || isCustomQuiz) {
      const ids = state.session.reviewQuizIds || [];
      list = ids.map((id) => questions.find((x) => x.id === id)).filter(Boolean);
    } else {
      list = byQuiz[name] || [];
    }
    if (!list.length) {
      if (isMistakeReview) {
        state.session.quizMode = "normal";
        state.session.reviewQuizIds = [];
        saveState();
        toast(t("mistakeReviewEmpty"), "bad");
        location.hash = "#/tests/" + encodeURIComponent(state.session.activeSubjectId || "");
        return;
      }
      if (isReviewQuiz) {
        clearReviewQuizMode();
        saveState();
        const rb = reviewRouteHashFromSession();
        v.innerHTML = `<div class="page-surface">${backBar(rb)}<div class="panel"><p class="empty">${esc(t("reviewLaterEmpty"))}</p></div></div>`;
        $("[data-back]")?.addEventListener("click", () => (location.hash = rb));
        return;
      }
      const sidM = subjectIdFromQuizKey(name);
      const subM = sidM ? subjectById(sidM) : null;
      const emptyMsg = subM ? t("quizEmptySubject") : t("emptyQuiz");
      v.innerHTML = `<div class="page-surface">${backBar(qb)}<div class="panel"><p class="empty">${esc(emptyMsg)}</p></div></div>`;
      $("[data-back]")?.addEventListener("click", () => (location.hash = qb));
      return;
    }

    isMistakeReview = state.session.quizMode === "mistakeReview";
    isCustomQuiz = state.session.quizMode === "customQuiz" && state.session.activeQuiz === IMC_COMPREHENSIVE_QUIZ_KEY;
    isReviewQuiz =
      state.session.quizMode === "review" && state.session.activeQuiz === REVIEW_SESSION_QUIZ_KEY;
    qb = quizBackHash();
    const rawIdx = Number.isFinite(Number(state.session.activeIdx)) ? Number(state.session.activeIdx) : 0;
    const answeredAll = countQuizListAnswered(list);
    const remainAll = Math.max(0, list.length - answeredAll);
    const progDone = list.length ? (answeredAll / list.length) * 100 : 0;
    const quizFullyDone = list.every((qq) => state.qs[qq.id]?.answered !== null);
    const isCompletionScreen = rawIdx >= list.length && quizFullyDone;
    let idx = isCompletionScreen ? list.length - 1 : clamp(rawIdx, 0, list.length - 1);
    state.session.activeIdx = isCompletionScreen ? list.length : idx;
    const q = list[idx];
    const s = ensureQs(q.id);
    const map = { ...vocabMap(q), ...EXTRA_HINTS, ...vocabCuratedMap() };
    const locked = s.answered !== null;
    const minimal = quizUiMinimalByContext(name, state.session.quizMode);
    const isArabicSubjectQuiz = true;
    const sessionWrongs = (state.session.lastSessionWrongIds || []).filter((id) =>
      list.some((qq) => qq.id === id),
    );
    const quizBookmarked = list.filter((qq) => state.qs[qq.id]?.rev).map((qq) => qq.id);
    const sessionReviewIds = [...new Set([...sessionWrongs, ...quizBookmarked])];
    const showSessionReview =
      !isMistakeReview &&
      !isReviewQuiz &&
      quizFullyDone &&
      sessionReviewIds.length > 0;
    const completionBlock = isCompletionScreen
      ? `<div class="quiz-complete-banner quiz-complete-banner--inline">
          <p class="quiz-complete-banner-title">${esc(t("quizCompleteSummaryTitle"))}</p>
          ${showSessionReview ? `<button type="button" class="btn btn-primary" id="quizSessionMistakeReview">${esc(t("quizReviewSessionMistakesBtn"))}</button>` : ""}
        </div>`
      : "";
    const disp = isMistakeReview
      ? t("mistakeReviewSessionTitle")
      : isReviewQuiz
        ? t("reviewQuizSessionTitle")
        : displayQuizName(name);
    const correctPick = q.options[q.correctIndex];
    const isCorrectFalseAnswer =
      locked &&
      !!s.ok &&
      q.correctIndex === 1 &&
      String(correctPick || "").trim() === "خطأ" &&
      !!q.false_explanation;
    const falseExplainBlock = isCorrectFalseAnswer
      ? `<div class="quiz-false-success" id="quizFalseSuccess">
          <div class="quiz-false-success-title">نعم، إجابتك صحيحة</div>
          <div class="quiz-false-success-line">
            <span></span>
            <span class="quiz-false-success-text">${esc(q.false_explanation)}</span>
          </div>
        </div>`
      : "";
    const wrongBlock =
      isReviewQuiz || (locked && !s.ok)
        ? `<div class="quiz-correct-only" id="quizWrongPanel">الإجابة الصحيحة: <span>${esc(correctPick || "—")}</span></div>`
        : "";

    v.innerHTML = `
      <div class="page-surface quiz-shell-split">
        <div class="quiz-fixed-panel" aria-label="معلومات الاختبار">
          <div class="quiz-fixed-toprow">
            <div class="quiz-page-head-start">
              ${backBar(qb)}
              <button type="button" class="btn btn-sec quiz-pause-btn" id="quizPause">${esc(t("quizPauseBtn"))}</button>
            </div>
            <div class="quiz-page-head-end">
              ${answeredAll > 0 ? `<button type="button" class="btn btn-sec" id="quizRestart">${esc(t("quizRestartBtn"))}</button>` : ""}
              ${
                minimal
                  ? ""
                  : `<div class="pillrow quiz-meta-pills">
                <button type="button" class="pill ${s.fav ? "on" : ""}" id="bf">${esc(t("favT"))}</button>
                <button type="button" class="pill ${s.hard ? "on" : ""}" id="bh">${esc(t("hardT"))}</button>
                <button type="button" class="pill ${s.rev ? "on" : ""}" id="br">${esc(t("revT"))}</button>
              </div>`
              }
            </div>
          </div>
          <div class="quiz-fixed-title">${esc(disp)}</div>
          <div class="quiz-qhead-stats">
            <div class="quiz-stat-grid" role="group" aria-label="${esc(t("testsTitle"))}">
              <div class="quiz-stat-cell">
                <span class="quiz-stat-k">${esc(t("quizStatAnsweredLabel"))}</span>
                <span class="quiz-stat-v">${answeredAll}<span style="opacity:.45;font-weight:700"> / ${list.length}</span></span>
              </div>
              <div class="quiz-stat-cell">
                <span class="quiz-stat-k">${esc(t("quizStatRemainingLabel"))}</span>
                <span class="quiz-stat-v">${remainAll}</span>
              </div>
              <div class="quiz-stat-cell">
                <span class="quiz-stat-k">${esc(t("quizStatPositionLabel"))}</span>
                <span class="quiz-stat-v">${idx + 1}<span style="opacity:.45;font-weight:700"> / ${list.length}</span></span>
              </div>
            </div>
            <div style="margin-top:10px" class="bar"><i style="width:${progDone}%"></i></div>
          </div>
        </div>

        <div class="quiz-dynamic-panel quiz-panel${minimal ? " quiz-panel--minimal" : ""}${isArabicSubjectQuiz ? " quiz-panel--rtl" : ""}" aria-label="السؤال والإجابات">
          ${isCompletionScreen ? completionBlock : `
          ${q.needs_review ? `<div class="review-banner">${esc(t("needsReview"))}</div>` : ""}
          <div class="quiz-learn-layout quiz-learn-layout--minimal">
            <div class="quiz-learn-main">
              <div class="qtext" id="qt" dir="${isArabicSubjectQuiz ? "rtl" : "auto"}"></div>
              <div class="opts" id="opts"></div>
              ${wrongBlock}
              ${falseExplainBlock}
            </div>
          </div>`}
        </div>

        <div class="quiz-action-panel" aria-label="تنقل السؤال">
          <div class="pillrow quiz-nav-row quiz-nav-row--tri">
            <button type="button" class="btn btn-sec" id="pr">${esc(t("prev"))}</button>
            <button type="button" class="btn btn-sec" id="quizReviewNavBtn">${esc(s.rev ? t("removeFromReviewBtn") : t("addToReviewBtn"))}</button>
            <button type="button" class="btn btn-primary" id="nx">${esc(t("next"))}</button>
          </div>
        </div>
      </div>
`;

    $("#quizPause").onclick = () => {
      saveState();
      toast(t("quizPausedToast"), "ok");
      location.hash = quizBackHash();
    };

    $("#quizRestart")?.addEventListener("click", () => {
      if (!confirm(t("quizRestartConfirm"))) return;
      resetActiveQuizProgress();
      render();
    });

    $("#quizSessionMistakeReview")?.addEventListener("click", () => {
      enterCustomReviewQuizSession({
        ids: sessionReviewIds,
        subjectId: state.session.activeSubjectId || subjectIdFromQuizKey(name),
        reset: true,
        skipMastered: false,
      });
    });

    $("#quizReviewNavBtn")?.addEventListener("click", () => {
      s.rev = !s.rev;
      if (!s.rev) s.reviewProficient = false;
      saveState();
      toast(t(s.rev ? "reviewSavedToast" : "reviewRemovedToast"), "ok");
      render();
    });

    if (!isCompletionScreen) {
      const qt = $("#qt");
      tokenizeEn(qt, q.question, map);

      const ox = $("#opts");
      q.options.forEach((op, i) => {
        const b = document.createElement("button");
        b.type = "button";
        b.className = "opt";
        if (locked) {
          b.disabled = true;
          if (i === q.correctIndex) b.classList.add("correct");
          if (s.answered === i && i !== q.correctIndex) b.classList.add("wrong");
        }
        b.innerHTML = `<span class="L">${String.fromCharCode(65 + i)}</span><span class="txt" dir="${isArabicSubjectQuiz ? "rtl" : "ltr"}"></span>`;
        tokenizeEn(b.querySelector(".txt"), op, map);
        b.onclick = () => {
          if (locked) return;
          s.answered = i;
          s.ok = i === q.correctIndex;
          if (!s.ok) s.skipReviewNudge = false;
          s.t0 = Date.now();
          const dk = new Date().toISOString().slice(0, 10);
          if (state.daily.day !== dk) {
            state.daily.day = dk;
            state.daily.answered = 0;
          }
          if (s.dailyCounted !== dk) {
            s.dailyCounted = dk;
            state.daily.answered++;
          }
          if (!s.ok && state.session.quizMode === "normal") {
            const arr = Array.isArray(state.session.lastSessionWrongIds)
              ? [...state.session.lastSessionWrongIds]
              : [];
            if (!arr.includes(q.id)) arr.push(q.id);
            state.session.lastSessionWrongIds = arr;
          }
          if (state.session.quizMode === "review") {
            s.reviewProficient = !!s.ok;
          }
          if (
            s.ok &&
            q.correctIndex === 1 &&
            String(q.options[q.correctIndex] || "").trim() === "خطأ" &&
            q.false_explanation
          ) {
            state.session.falseExplainAutoQid = "";
            saveState();
            beep(s.ok);
            render();
            return;
          }
          state.session.falseExplainAutoQid = "";
          saveState();
          beep(s.ok);
          if (s.ok && idx < list.length - 1) {
            setTimeout(() => {
              state.session.activeIdx = clamp(idx + 1, 0, list.length - 1);
              saveState();
              render();
            }, 420);
            return;
          }
          render();
        };
        ox.appendChild(b);
      });
    }

    $("#pr").onclick = () => {
      state.session.falseExplainAutoQid = "";
      state.session.activeIdx = isCompletionScreen ? list.length - 1 : clamp(idx - 1, 0, list.length - 1);
      saveState();
      render();
    };
    $("#nx").onclick = () => {
      if (isCompletionScreen) return;
      const curState = ensureQs(q.id);
      if (!locked && !curState.rev) {
        toast(t("pickAnswer"), "bad");
        return;
      }
      if (idx >= list.length - 1) {
        if (quizFullyDone) {
          state.session.falseExplainAutoQid = "";
          state.session.activeIdx = list.length;
          saveState();
          render();
          return;
        }
        toast(t("pickAnswer"), "bad");
        return;
      }
      state.session.falseExplainAutoQid = "";
      state.session.activeIdx = clamp(idx + 1, 0, list.length - 1);
      saveState();
      render();
    };
    $("#bf")?.addEventListener("click", () => {
      s.fav = !s.fav;
      saveState();
      render();
    });
    $("#bh")?.addEventListener("click", () => {
      s.hard = !s.hard;
      saveState();
      render();
    });
    $("#br")?.addEventListener("click", () => {
      s.rev = !s.rev;
      if (isReviewQuiz && !s.rev) {
        state.session.reviewQuizIds = (state.session.reviewQuizIds || []).filter((id) => id !== q.id);
      }
      saveState();
      render();
    });
    $("[data-back]")?.addEventListener("click", () =>
      (location.hash = isReviewQuiz ? reviewRouteHashFromSession() : quizBackHash()),
    );
  }

  function render() {
    closeTopbarMenu();
    parseRoute();
    document.body.classList.toggle("no-page-anim", route === "quiz");
    document.documentElement.lang = lang;
    document.documentElement.dir = lang === "ar" ? "rtl" : "ltr";
    document.documentElement.setAttribute("data-theme", theme);
    $("#brandTitle").textContent = "دبلوم التسويق التطبيقي";
    $("#tTheme").textContent = theme === "dark" ? "☀" : "☾";
    const soundBtn = $("#tSound");
    if (soundBtn) soundBtn.textContent = soundOn ? "🔊" : "🔇";
    renderNav();
    if (route === "home") renderHome();
    else if (route === "tests") renderTests();
    else if (route === "quiz") renderQuiz();
    else if (route === "study") renderStudyPage();
    else if (route === "review") renderReviewPage();
    else renderHome();
    syncMobileTabbar();
    bindTopbarScroll();
    // لا نعيد تشغيل أنيميشن الدخول بعد أي ضغط/إعادة رسم
    try {
      document.body.classList.remove("anim-once");
    } catch (_) {}

    requestAnimationFrame(() => {
      if (route !== "quiz") {
        window.scrollTo({ top: 0, left: 0, behavior: "auto" });
      }
    });
  }

  function syncMobileTabbar() {
    const bar = $("#mobileTabbar");
    if (!bar) return;
    bar.querySelectorAll("[data-tkey]").forEach((el) => {
      const k = el.getAttribute("data-tkey");
      if (k) el.textContent = t(k);
    });
    const routes = {
      tests: () =>
        route === "home" ||
        route === "tests" ||
        route === "quiz" ||
        route === "review",
    };
    bar.querySelectorAll(".mobile-tab").forEach((a) => {
      const key = a.getAttribute("data-route");
      const active = routes[key] ? routes[key]() : false;
      a.classList.toggle("is-active", active);
      if (active) a.setAttribute("aria-current", "page");
      else a.removeAttribute("aria-current");
    });
  }

  function updateTopbarMenuTop() {
    const tb = document.getElementById("topbar");
    if (!tb) return;
    const y = tb.getBoundingClientRect().bottom;
    document.documentElement.style.setProperty("--topbar-menu-top", `${Math.ceil(y)}px`);
  }

  function setTopbarMenuOpen(open) {
    const bar = document.getElementById("topbar");
    const btn = document.getElementById("topbarMenuBtn");
    const bd = document.getElementById("topbarBackdrop");
    if (!bar || !btn) return;
    const on = !!open;
    bar.classList.toggle("is-menu-open", on);
    btn.setAttribute("aria-expanded", on ? "true" : "false");
    if (bd) bd.setAttribute("aria-hidden", on ? "false" : "true");
    if (on) {
      updateTopbarMenuTop();
      document.body.style.overflow = "hidden";
    } else {
      document.body.style.overflow = "";
    }
  }

  function closeTopbarMenu() {
    setTopbarMenuOpen(false);
  }

  let topbarScrollBound = false;
  function bindTopbarScroll() {
    if (topbarScrollBound) return;
    const tb = document.querySelector(".topbar");
    if (!tb) return;
    topbarScrollBound = true;
    const onScroll = () => tb.classList.toggle("is-scrolled", window.scrollY > 6);
    onScroll();
    window.addEventListener("scroll", onScroll, { passive: true });
  }

  function wire() {
    $("#goBrand")?.addEventListener("click", () => {
      closeTopbarMenu();
      location.hash = "#/";
    });
    $("#topbarMenuBtn")?.addEventListener("click", (e) => {
      e.stopPropagation();
      const bar = $("#topbar");
      setTopbarMenuOpen(!bar?.classList.contains("is-menu-open"));
    });
    $("#topbarBackdrop")?.addEventListener("click", closeTopbarMenu);
    $("#topbarCluster")?.addEventListener("click", (e) => {
      if (e.target.closest("#mainNav a")) closeTopbarMenu();
    });
    window.addEventListener(
      "resize",
      () => {
        if (window.innerWidth > 900) closeTopbarMenu();
        else updateTopbarMenuTop();
      },
      { passive: true },
    );
    document.addEventListener("keydown", (e) => {
      if (e.key !== "Escape") return;
      if ($("#topbar")?.classList.contains("is-menu-open")) closeTopbarMenu();
    });
    $("#tTheme")?.addEventListener("click", () => {
      theme = theme === "dark" ? "light" : "dark";
      localStorage.setItem("em:theme", theme);
      render();
    });
    $("#tSound")?.addEventListener("click", () => {
      soundOn = !soundOn;
      localStorage.setItem("em:sound", soundOn ? "1" : "0");
      render();
    });
    window.addEventListener("hashchange", render);
    document.addEventListener("click", (e) => {
      if (!e.target.closest("#wtip") && !e.target.closest(".w-token")) {
        const tip = $("#wtip");
        if (tip) tip.style.display = "none";
      }
    });
    window.addEventListener("keydown", (e) => {
      if (route !== "quiz" || !questions.length) return;
      const name = state.session.activeQuiz;
      const list = byQuiz[name] || [];
      if (!list.length) return;
      const idx = state.session.activeIdx;
      const q = list[idx];
      const st = state.qs[q.id];
      if (e.key >= "1" && e.key <= "9") {
        const n = parseInt(e.key, 10) - 1;
        if (n >= 0 && n < q.options.length && st.answered === null) {
          $$(".opt", $("#opts"))[n]?.click();
        }
      }
    });
  }

  state = loadState();
  bootQuestions();
  bootGrammar();
  wire();
  initVisitorCounter();
  render();
})();
</script>
</body>
</html>
